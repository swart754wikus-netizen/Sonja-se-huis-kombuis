<!DOCTYPE html>
<html lang="en">
<head>

<body>

<header>
  <div class="nav">
    <a href="index.html" class="brand"><img src="assets/logo-small.png" alt="" class="logo-img"><span class="sr-only">Sonja se Huis Kombuis</span></a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html" class="active">Products</a>
      <a href="contact.html">Contact</a>
      <button class="basket-btn" onclick="toggleCart()">🧺 Basket <span class="basket-count">0</span></button>
    </nav>

<section>

  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span id="cart-total">R0.00</span>

<script src="products.js"></script>
