<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | Sonja se Huis Kombuis</title>
<meta name="description" content="Shop home-baked rusks and cookies from Sonja se Huis Kombuis.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23D9825A'/><text x='16' y='23' font-family='sans-serif' font-weight='800' font-size='18' fill='white' text-anchor='middle'>S</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="brand">Sonja se <span>Huis Kombuis</span></a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html" class="active">Products</a>
      <a href="contact.html">Contact</a>
      <button class="basket-btn" onclick="toggleCart()">🧺 Basket <span class="basket-count">0</span></button>
    </nav>
  </div>
</header>

<section>
  <div class="section-title">
    <h2>Our Products</h2>
    <p>Rusks and cookies, baked fresh. Add your favourites to the basket.</p>
  </div>
  <div class="product-grid" id="product-grid"></div>
</section>

<footer>
  <div class="brand">Sonja se <span style="color:#D9825A">Huis Kombuis</span></div>
  <p>&copy; <span id="year"></span> Sonja se Huis Kombuis. All rights reserved.</p>
</footer>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<aside class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h3>Your Basket</h3>
    <button class="cart-close" onclick="closeCart()">&times;</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span id="cart-total">R0.00</span>
    </div>
    <a href="checkout.html" class="btn btn-block">Checkout</a>
  </div>
</aside>

<script src="cart.js"></script>
<script src="products.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
